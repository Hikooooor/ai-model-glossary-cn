name: Daily DeepSeek AI Radar

# 设置触发条件
on:
  # 暂时关闭自动抓取，仅保留手动触发
  workflow_dispatch:

# 给 Action 推送代码的回写权限（重点：它每天会把爬到的新数据存成JS文件并自己提交进仓库！）
permissions:
  contents: write

concurrency:
  group: daily-radar
  cancel-in-progress: false

jobs:
  run-daily-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 检出代码库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 用稳定的版本执行

      - name: 安装必备请求库
        run: |
          python -m pip install --upgrade pip
          # 目前我们只用了内置的 urllib, 没有额外的三方依赖，非常轻量
          # pip install requests beautifulsoup4  # 未来如果写真爬虫这里就可以解除了

      - name: 调用 DeepSeek API 分析最新学术前沿
        env:
          # 神奇的地方：这一行会自动调取你在 GitHub 网页上配置的安全密文，你的 Key 不会泄露在你的代码里
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python scripts/daily_spider.py

      - name: 记录本次运行时间（用于排查定时触发）
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone, timedelta

          now_utc = datetime.now(timezone.utc)
          beijing = now_utc.astimezone(timezone(timedelta(hours=8)))

          payload = {
            "last_run_utc": now_utc.strftime("%Y-%m-%d %H:%M:%S"),
            "last_run_beijing": beijing.strftime("%Y-%m-%d %H:%M:%S"),
            "workflow": "daily-update",
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}"
          }

          with open("data/last-run.json", "w", encoding="utf-8") as f:
            json.dump(payload, f, ensure_ascii=False, indent=2)
          PY
          
      - name: 让机器人将生成的雷达分析页推送至网页端
        run: |
          git config --global user.name "AI Radar Bot 🤖"
          git config --global user.email "bot@github-actions.local"
          # 如果雷达更新出了新文件或改动了数据
          git add latest-radar.js
          git add data/radar-history.json
          git add data/history-index.json
          git add data/*.json
          # 仅在有变动时提交
          if git diff --cached --quiet; then
            echo "无文件变更，跳过提交。"
          else
            git commit -m "🚀 每日 AI 前沿播报: $(date +'%Y-%m-%d')"
            git push
          fi
